events {
    worker_connections 1024;
}

http {
    # Upstream service backends
    upstream auth_service {
        server auth-service:8001;
    }
    upstream user_service {
        server user-service:8002;
    }
    upstream trip_service {
        server trip-service:8003;
    }
    upstream booking_service {
        server booking-service:8004;
    }
    upstream payment_service {
        server payment-service:8005;
    }
    upstream notification_service {
        server notification-service:8006;
    }

    server {
        listen 80;
        server_name _;

        # ───────────────────────────────────
        # CORS headers for all responses
        # ───────────────────────────────────
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;

        # Handle OPTIONS preflight
        location / {
            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ───────────────────────────────────
        # Auth Service
        # ───────────────────────────────────
        location /auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────
        # User Service
        # ───────────────────────────────────
        location /users/ {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────
        # Trip Service
        # ───────────────────────────────────
        location /trips/ {
            proxy_pass http://trip_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────
        # Booking Service
        # ───────────────────────────────────
        location /bookings/ {
            proxy_pass http://booking_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────
        # Payment Service
        # ───────────────────────────────────
        location /payments/ {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────
        # Notification Service
        # ───────────────────────────────────
        location /notifications/ {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ───────────────────────────────────
        # Gateway health check
        # ───────────────────────────────────
        location /health {
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }
    }
}
