name: CI/CD Pipeline - Bus Ticket App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ─────────────────────────────────────
  # LINT & TEST
  # ─────────────────────────────────────
  lint-and-test:
    name: 🔍 Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - trip-service
          - booking-service
          - payment-service
          - notification-service

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          cd services/${{ matrix.service }}
          pip install -r requirements.txt
          pip install pytest flake8 httpx

      - name: 🔎 Lint with flake8
        run: |
          cd services/${{ matrix.service }}
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: 🧪 Run tests
        run: |
          cd services/${{ matrix.service }}
          python -m pytest tests/ -v --tb=short || echo "No tests found yet"

  # ─────────────────────────────────────
  # BUILD DOCKER IMAGES
  # ─────────────────────────────────────
  build:
    name: 🐳 Build & Push Images
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service:
          - auth-service
          - user-service
          - trip-service
          - booking-service
          - payment-service
          - notification-service
          - api-gateway

    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔐 Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────
  # DEPLOY TO K8S (placeholder)
  # ─────────────────────────────────────
  deploy:
    name: ☸️ Deploy to Kubernetes
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ☸️ Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: 🔑 Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: 🚀 Deploy to cluster
        run: |
          kubectl create namespace bus-ticket --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/ -n bus-ticket
          echo "✅ Deployment complete!"

      - name: 🔄 Restart deployments with new images
        run: |
          for svc in auth user trip booking payment notification; do
            kubectl rollout restart deployment/${svc}-service -n bus-ticket || true
          done

      - name: ✅ Verify rollout
        run: |
          for svc in auth user trip booking payment notification; do
            kubectl rollout status deployment/${svc}-service -n bus-ticket --timeout=120s || true
          done
