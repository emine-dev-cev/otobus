---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: bus-ticket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
    spec:
      containers:
        - name: booking-service
          image: bus-ticket/booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8004
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:SecureP@ssw0rd123@postgres:5432/booking_db"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: TRIP_SERVICE_URL
              value: "http://trip-service:8003"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /bookings/health
              port: 8004
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: bus-ticket
spec:
  selector:
    app: booking-service
  ports:
    - port: 8004
      targetPort: 8004
