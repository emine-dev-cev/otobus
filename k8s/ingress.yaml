---
# Nginx Ingress Controller route rules
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bus-ticket-ingress
  namespace: bus-ticket
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/enable-cors: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: bus-ticket.local
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8001
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8002
          - path: /trips
            pathType: Prefix
            backend:
              service:
                name: trip-service
                port:
                  number: 8003
          - path: /bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 8004
          - path: /payments
            pathType: Prefix
            backend:
              service:
                name: payment-service
                port:
                  number: 8005
          - path: /notifications
            pathType: Prefix
            backend:
              service:
                name: notification-service
                port:
                  number: 8006
