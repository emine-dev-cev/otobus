---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: bus-ticket
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: bus-ticket/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8005
          env:
            - name: DATABASE_URL
              value: "postgresql://postgres:SecureP@ssw0rd123@postgres:5432/payment_db"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
            - name: REDIS_URL
              value: "redis://redis:6379"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:29092"
            - name: BOOKING_SERVICE_URL
              value: "http://booking-service:8004"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /payments/health
              port: 8005
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: bus-ticket
spec:
  selector:
    app: payment-service
  ports:
    - port: 8005
      targetPort: 8005
